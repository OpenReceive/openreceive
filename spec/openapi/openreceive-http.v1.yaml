openapi: 3.1.0
info:
  title: OpenReceive host-owned payment HTTP API
  version: 0.4.0
  description: >
    Mounted receive-checkout routes. The host owns orders and openreceive_payments rows.
    It resolves every checkout amount and stores each payment attempt before a payer response.
servers:
  - url: /openreceive
paths:
  /checkouts:
    post:
      operationId: createCheckout
      summary: Mint an invoice using the host-resolved order price.
      description: >
        The request cannot supply an amount. The mounted handler asks the required
        host integration for the trusted order price, mints an invoice, and returns
        payer instructions only after the host persists payment_hash.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCheckoutRequest'
      responses:
        '201':
          description: Checkout committed by the host.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateCheckoutResponse'
        '400': { $ref: '#/components/responses/Error' }
        '403': { $ref: '#/components/responses/Error' }
        '409': { $ref: '#/components/responses/Error' }
  /payments/check:
    post:
      operationId: checkPayment
      summary: Verify one host-owned payment attempt against the receive wallet.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentCheckRequest'
      responses:
        '200':
          description: Current wallet-derived payment state.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentCheck'
        '400': { $ref: '#/components/responses/Error' }
        '403': { $ref: '#/components/responses/Error' }
  /swaps/quote:
    post:
      operationId: quoteSwap
      summary: Obtain a non-binding swap quote.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SwapQuoteRequest'
      responses:
        '200':
          description: Provider quote.
          content:
            application/json:
              schema: { type: object, additionalProperties: true }
        '400': { $ref: '#/components/responses/Error' }
  /swaps:
    post:
      operationId: createSwap
      summary: Create a swap using the host-resolved order price.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSwapRequest'
      responses:
        '201':
          description: Swap committed by the host.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateSwapResponse'
        '400': { $ref: '#/components/responses/Error' }
        '409': { $ref: '#/components/responses/Error' }
  /swaps/status:
    post:
      operationId: getSwap
      summary: Refresh provider state using server-only swap data loaded by the host.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderRequest'
      responses:
        '200':
          description: Provider-derived swap state.
          content:
            application/json:
              schema: { type: object, additionalProperties: true }
  /swaps/refunds:
    post:
      operationId: refundSwap
      summary: Refresh provider state, then request an eligible refund.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [order_id, payment_hash, refund_address]
              properties:
                order_id: { type: string, minLength: 1, maxLength: 200 }
                payment_hash: { type: string, pattern: '^[0-9a-f]{64}$' }
                refund_address: { type: string, minLength: 1 }
      responses:
        '200':
          description: Provider-derived refund state.
          content:
            application/json:
              schema: { type: object, additionalProperties: true }
  /rates:
    get:
      operationId: listRates
      parameters:
        - in: query
          name: currencies
          schema: { type: string }
      responses:
        '200':
          description: Current process-cached BTC/fiat rates.
          content:
            application/json:
              schema: { type: object, additionalProperties: true }
components:
  responses:
    Error:
      description: OpenReceive error.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
  schemas:
    Amount:
      oneOf:
        - type: object
          additionalProperties: false
          required: [sats]
          properties:
            sats:
              oneOf:
                - { type: integer, minimum: 1, maximum: 9007199254740 }
                - { type: string, pattern: '^[1-9][0-9]*$' }
        - type: object
          additionalProperties: false
          required: [currency, value]
          properties:
            currency: { type: string, pattern: '^[A-Z]{3}$' }
            value: { type: string, pattern: '^[0-9]+(\.[0-9]+)?$' }
    CreateCheckoutRequest:
      type: object
      additionalProperties: false
      required: [order_id]
      properties:
        order_id: { type: string, minLength: 1, maxLength: 200 }
        memo: { type: string, maxLength: 500 }
        description_hash: { type: string }
        metadata: { type: object, additionalProperties: true }
    Checkout:
      type: object
      additionalProperties: false
      required: [order_id, payment_hash, bolt11, amount_msats, created_at, expires_at]
      properties:
        order_id: { type: string, minLength: 1, maxLength: 200 }
        payment_hash: { type: string, pattern: '^[0-9a-f]{64}$' }
        bolt11: { type: string, minLength: 1 }
        amount_msats: { type: integer, minimum: 1000, maximum: 9007199254740991 }
        created_at: { type: integer, minimum: 0 }
        expires_at: { type: integer, minimum: 0 }
        fiat_quote:
          oneOf:
            - { type: 'null' }
            - { type: object, additionalProperties: true }
    CreateCheckoutResponse:
      type: object
      additionalProperties: false
      required: [checkout]
      properties:
        checkout: { $ref: '#/components/schemas/Checkout' }
    PaymentCheckRequest:
      type: object
      additionalProperties: false
      required: [order_id, payment_hash]
      properties:
        order_id: { type: string, minLength: 1, maxLength: 200 }
        payment_hash: { type: string, pattern: '^[0-9a-f]{64}$' }
    PaymentStatus:
      type: string
      enum: [pending, settled, expired, failed, not_found]
    PaymentCheck:
      type: object
      additionalProperties: false
      required: [payment_hash, status]
      properties:
        payment_hash: { type: string, pattern: '^[0-9a-f]{64}$' }
        status: { $ref: '#/components/schemas/PaymentStatus' }
        paid_at: { type: integer, minimum: 0 }
        details: { type: object, additionalProperties: true }
    SwapQuoteRequest:
      type: object
      additionalProperties: false
      required: [order_id, pay_in_asset]
      properties:
        order_id: { type: string, minLength: 1, maxLength: 200 }
        pay_in_asset: { type: string, minLength: 1 }
    CreateSwapRequest:
      type: object
      additionalProperties: false
      required: [order_id, pay_in_asset]
      properties:
        order_id: { type: string, minLength: 1, maxLength: 200 }
        pay_in_asset: { type: string, minLength: 1 }
        memo: { type: string, maxLength: 500 }
        metadata: { type: object, additionalProperties: true }
    CreateSwapResponse:
      type: object
      additionalProperties: false
      required: [swap]
      properties:
        swap: { type: object, additionalProperties: true }
    OrderRequest:
      type: object
      additionalProperties: false
      required: [order_id, payment_hash]
      properties:
        order_id: { type: string, minLength: 1, maxLength: 200 }
        payment_hash: { type: string, pattern: '^[0-9a-f]{64}$' }
    Error:
      type: object
      additionalProperties: false
      required: [code, message]
      properties:
        code: { type: string }
        message: { type: string }
        request_id: { type: string }
        retryable: { type: boolean }
