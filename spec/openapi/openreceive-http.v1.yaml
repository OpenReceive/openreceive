openapi: 3.1.0
info:
  title: OpenReceive component schemas
  version: 0.1.0
  summary: Shared receive-checkout shapes for app-owned controllers.
  description: >
    OpenReceive does not define application routes. Apps call the Node service
    methods from their own controllers and may use these schemas as references
    for their own payloads. Receive-only NWC codes remain server-side.
paths: {}
components:
  parameters:
    OrderId:
      name: order_id
      in: path
      required: true
      schema:
        type: string
        minLength: 1
        maxLength: 200
    CheckoutId:
      name: checkout_id
      in: path
      required: true
      schema:
        type: string
        pattern: "^or_chk_[a-z0-9_]+$"
  responses:
    Error:
      description: OpenReceive error.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
  schemas:
    CreateCheckoutRequest:
      type: object
      additionalProperties: false
      required:
        - orderId
        - amount
      properties:
        orderId:
          type: string
          minLength: 1
          maxLength: 200
        amount:
          $ref: "#/components/schemas/CreateCheckoutAmount"
        memo:
          type: string
          maxLength: 500
        descriptionHash:
          type: string
          pattern: "^[0-9a-fA-F]{64}$"
        expiresInSeconds:
          type: integer
          minimum: 1
      not:
        required:
          - memo
          - descriptionHash
    CreateCheckoutAmount:
      type: object
      additionalProperties: false
      properties:
        btc:
          $ref: "#/components/schemas/BitcoinAmount"
        sats:
          oneOf:
            - type: integer
              minimum: 1
              maximum: 9007199254740
            - type: string
              pattern: "^[0-9]+$"
        msats:
          oneOf:
            - type: integer
              minimum: 1000
              maximum: 9007199254740991
            - type: string
              pattern: "^[0-9]+$"
        fiat:
          $ref: "#/components/schemas/FiatAmount"
      oneOf:
        - required:
            - btc
          not:
            anyOf:
              - required:
                  - sats
              - required:
                  - msats
              - required:
                  - fiat
        - required:
            - sats
          not:
            anyOf:
              - required:
                  - btc
              - required:
                  - msats
              - required:
                  - fiat
        - required:
            - msats
          not:
            anyOf:
              - required:
                  - btc
              - required:
                  - sats
              - required:
                  - fiat
        - required:
            - fiat
          not:
            anyOf:
              - required:
                  - btc
              - required:
                  - sats
              - required:
                  - msats
    QuoteRateRequest:
      type: object
      additionalProperties: false
      required:
        - fiat
      properties:
        fiat:
          $ref: "#/components/schemas/FiatAmount"
    BtcFiatRateMap:
      type: object
      additionalProperties: false
      required:
        - bitcoin
      properties:
        bitcoin:
          type: object
          additionalProperties:
            oneOf:
              - type: number
              - type: string
                pattern: "^[0-9]+(\\.[0-9]+)?$"
    Invoice:
      type: object
      additionalProperties: true
      required:
        - invoice_id
        - type
        - transaction_state
        - workflow_state
        - invoice
        - payment_hash
        - amount_msats
        - order_id
        - created_at
        - expires_at
        - settlement_action_state
      properties:
        invoice_id:
          type: string
          pattern: "^or_inv_[a-z0-9_]+$"
        type:
          const: incoming
        transaction_state:
          $ref: "#/components/schemas/TransactionState"
        workflow_state:
          $ref: "#/components/schemas/WorkflowState"
        invoice:
          type: string
        payment_hash:
          type: string
          pattern: "^[0-9a-fA-F]{64}$"
        amount_msats:
          type: integer
          minimum: 1000
          maximum: 9007199254740991
        order_id:
          type: string
          minLength: 1
        created_at:
          type: integer
          minimum: 0
        expires_at:
          type: integer
          minimum: 0
        refreshed_from_invoice_id:
          type: string
          pattern: "^or_inv_[a-z0-9_]+$"
        settled_at:
          type: integer
          minimum: 0
        settlement_action_state:
          type: string
          enum:
            - pending
            - completed
            - failed
        settlement_action_completed_at:
          type: integer
          minimum: 0
        fiat_quote:
          oneOf:
            - $ref: "#/components/schemas/RateQuote"
            - type: "null"
    Checkout:
      type: object
      additionalProperties: false
      required:
        - checkout_id
        - order_id
        - status
        - amount_msats
        - invoices
        - created_at
      properties:
        checkout_id:
          type: string
          pattern: "^or_chk_[a-z0-9_]+$"
        order_id:
          type: string
          minLength: 1
        status:
          type: string
          enum:
            - open
            - superseded
            - paid
            - expired
        amount_msats:
          type: integer
          minimum: 1000
          maximum: 9007199254740991
        fiat:
          $ref: "#/components/schemas/FiatAmount"
        active:
          $ref: "#/components/schemas/Invoice"
        invoices:
          type: array
          items:
            $ref: "#/components/schemas/Invoice"
        paid_at:
          type: integer
          minimum: 0
        created_at:
          type: integer
          minimum: 0
    Order:
      type: object
      additionalProperties: false
      required:
        - order_id
        - status
        - paid
        - checkouts
        - wallet_scan_performed
        - transactions_checked
      properties:
        order_id:
          type: string
          minLength: 1
        status:
          type: string
          enum:
            - pending
            - paid
            - expired
        paid:
          type: boolean
        paid_at:
          type: integer
          minimum: 0
        paid_checkout:
          $ref: "#/components/schemas/Checkout"
        active_checkout:
          $ref: "#/components/schemas/Checkout"
        checkouts:
          type: array
          items:
            $ref: "#/components/schemas/Checkout"
        wallet_scan_performed:
          type: boolean
        transactions_checked:
          type: integer
          minimum: 0
    FiatAmount:
      type: object
      additionalProperties: false
      required:
        - currency
        - value
      properties:
        currency:
          type: string
          pattern: "^[A-Z]{3}$"
        value:
          type: string
          pattern: "^[0-9]+(\\.[0-9]+)?$"
    BitcoinAmount:
      type: object
      additionalProperties: false
      required:
        - currency
        - value
      properties:
        currency:
          type: string
          enum:
            - BTC
            - SAT
            - SATS
        value:
          type: string
          pattern: "^[0-9]+(\\.[0-9]+)?$"
    RateQuote:
      type: object
      additionalProperties: true
      required:
        - fiat
        - btc_fiat_price
        - amount_sats
        - amount_msats
        - source
        - as_of
        - expires_at
    TransactionState:
      type: string
      enum:
        - pending
        - settled
        - expired
        - failed
        - accepted
    WorkflowState:
      type: string
      enum:
        - draft
        - invoice_created
        - verifying
        - settlement_action_pending
        - settlement_action_completed
        - expiry_pending_verification
        - expired_closed
        - failed_closed
        - cancelled
    Error:
      type: object
      additionalProperties: false
      required:
        - code
        - message
      properties:
        code:
          type: string
          enum:
            - NOT_IMPLEMENTED
            - RESTRICTED
            - UNAUTHORIZED
            - RATE_LIMITED
            - QUOTA_EXCEEDED
            - INTERNAL
            - UNSUPPORTED_ENCRYPTION
            - INSUFFICIENT_BALANCE
            - PAYMENT_FAILED
            - OTHER
            - NOT_FOUND
            - TIMEOUT
            - INVALID_REQUEST
            - WALLET_UNAVAILABLE
            - INVOICE_EXPIRED
            - UNSUPPORTED_METHOD
            - CONFLICT
        message:
          type: string
          minLength: 1
        retryable:
          type: boolean
        request_id:
          type: string
        details:
          type: object
          additionalProperties: true
