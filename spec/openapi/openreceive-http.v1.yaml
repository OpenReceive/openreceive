openapi: 3.1.0
info:
  title: OpenReceive HTTP API
  version: 0.1.0
  summary: Example receive-checkout payloads for app-owned controllers.
  description: >
    OpenReceive does not ship a required HTTP daemon or route bundle. Apps call
    the Node service methods from their own controllers. Receive-only NWC codes
    remain server-side.
servers:
  - url: /openreceive/v1
paths:
  /orders/{order_id}/checkouts:
    post:
      operationId: createCheckout
      summary: Create or continue a checkout for a merchant order id.
      description: >
        Reusing the same order id and amount continues the current checkout.
        Reusing the same order id with a different amount creates a new checkout
        and supersedes the previous open checkout. If the active invoice has
        expired, the checkout is renewed with a linked invoice row.
      parameters:
        - $ref: "#/components/parameters/OrderId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCheckoutRequest"
      responses:
        "201":
          description: Checkout created or renewed.
          headers:
            Cache-Control:
              schema:
                type: string
              description: Always no-store for checkout responses.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Checkout"
        "200":
          description: Existing active checkout returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Checkout"
        "400":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"
  /checkouts/{checkout_id}:
    get:
      operationId: getCheckout
      summary: Read one checkout by checkout id.
      parameters:
        - $ref: "#/components/parameters/CheckoutId"
      responses:
        "200":
          description: Checkout status and invoice history.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Checkout"
        "404":
          $ref: "#/components/responses/Error"
  /orders/{order_id}/status:
    post:
      operationId: getOrder
      summary: Refresh and read an order from the server-side wallet.
      description: >
        Each request may claim the durable global scan gate and perform at most
        one bounded NIP-47 list_transactions page for the order's stored invoice
        windows. If the gate is already claimed, the stored order state is
        returned without contacting the wallet. Paying any invoice in any
        checkout for the order marks the order paid.
      parameters:
        - $ref: "#/components/parameters/OrderId"
      responses:
        "200":
          description: Stored order status, optionally after one wallet transaction page.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  /rates:
    get:
      operationId: listRates
      summary: Return the deterministic v0.1 BTC fiat rate map.
      responses:
        "200":
          description: Simple Price compatible BTC fiat rate map.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BtcFiatRateMap"
  /rates/quote:
    post:
      operationId: quoteRates
      summary: Quote fiat amount to whole-sat millisatoshis.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuoteRateRequest"
      responses:
        "200":
          description: Deterministic rate quote.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RateQuote"
        "400":
          $ref: "#/components/responses/Error"
components:
  parameters:
    OrderId:
      name: order_id
      in: path
      required: true
      schema:
        type: string
        minLength: 1
        maxLength: 200
    CheckoutId:
      name: checkout_id
      in: path
      required: true
      schema:
        type: string
        pattern: "^or_chk_[a-z0-9_]+$"
  responses:
    Error:
      description: OpenReceive error.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
  schemas:
    CreateCheckoutRequest:
      type: object
      additionalProperties: false
      properties:
        order_id:
          type: string
          minLength: 1
          maxLength: 200
        amount:
          $ref: "#/components/schemas/BitcoinAmount"
        amount_sats:
          type: integer
          minimum: 1
          maximum: 9007199254740
        amount_msats:
          type: integer
          minimum: 1000
          maximum: 9007199254740991
        fiat:
          $ref: "#/components/schemas/FiatAmount"
        optional_invoice_description:
          type: string
          maxLength: 500
        description_hash:
          type: string
          pattern: "^[0-9a-fA-F]{64}$"
        expiry:
          type: integer
          minimum: 1
      oneOf:
        - required:
            - amount
          not:
            anyOf:
              - required:
                  - amount_sats
              - required:
                  - amount_msats
              - required:
                  - fiat
        - required:
            - amount_sats
          not:
            anyOf:
              - required:
                  - amount
              - required:
                  - amount_msats
              - required:
                  - fiat
        - required:
            - amount_msats
          not:
            anyOf:
              - required:
                  - amount
              - required:
                  - amount_sats
              - required:
                  - fiat
        - required:
            - fiat
          not:
            anyOf:
              - required:
                  - amount
              - required:
                  - amount_sats
              - required:
                  - amount_msats
      not:
        required:
          - optional_invoice_description
          - description_hash
    QuoteRateRequest:
      type: object
      additionalProperties: false
      required:
        - fiat
      properties:
        fiat:
          $ref: "#/components/schemas/FiatAmount"
    BtcFiatRateMap:
      type: object
      additionalProperties: false
      required:
        - bitcoin
      properties:
        bitcoin:
          type: object
          additionalProperties:
            oneOf:
              - type: number
              - type: string
                pattern: "^[0-9]+(\\.[0-9]+)?$"
    Invoice:
      type: object
      additionalProperties: true
      required:
        - invoice_id
        - type
        - transaction_state
        - workflow_state
        - invoice
        - payment_hash
        - amount_msats
        - order_uuid
        - created_at
        - expires_at
        - settlement_action_state
      properties:
        invoice_id:
          type: string
          pattern: "^or_inv_[a-z0-9_]+$"
        type:
          const: incoming
        transaction_state:
          $ref: "#/components/schemas/TransactionState"
        workflow_state:
          $ref: "#/components/schemas/WorkflowState"
        invoice:
          type: string
        payment_hash:
          type: string
          pattern: "^[0-9a-fA-F]{64}$"
        amount_msats:
          type: integer
          minimum: 1000
          maximum: 9007199254740991
        order_uuid:
          type: string
          minLength: 1
        created_at:
          type: integer
          minimum: 0
        expires_at:
          type: integer
          minimum: 0
        refreshed_from_invoice_id:
          type: string
          pattern: "^or_inv_[a-z0-9_]+$"
        settled_at:
          type: integer
          minimum: 0
        settlement_action_state:
          type: string
          enum:
            - pending
            - completed
            - failed
        settlement_action_completed_at:
          type: integer
          minimum: 0
        fiat_quote:
          oneOf:
            - $ref: "#/components/schemas/RateQuote"
            - type: "null"
    Checkout:
      type: object
      additionalProperties: false
      required:
        - checkout_id
        - order_id
        - status
        - amount_msats
        - invoices
        - created_at
      properties:
        checkout_id:
          type: string
          pattern: "^or_chk_[a-z0-9_]+$"
        order_id:
          type: string
          minLength: 1
        status:
          type: string
          enum:
            - open
            - superseded
            - paid
            - expired
        amount_msats:
          type: integer
          minimum: 1000
          maximum: 9007199254740991
        fiat:
          $ref: "#/components/schemas/FiatAmount"
        active:
          $ref: "#/components/schemas/Invoice"
        invoices:
          type: array
          items:
            $ref: "#/components/schemas/Invoice"
        paid_at:
          type: integer
          minimum: 0
        created_at:
          type: integer
          minimum: 0
    Order:
      type: object
      additionalProperties: false
      required:
        - order_id
        - status
        - paid
        - checkouts
        - wallet_scan_performed
        - transactions_checked
      properties:
        order_id:
          type: string
          minLength: 1
        status:
          type: string
          enum:
            - pending
            - paid
            - expired
        paid:
          type: boolean
        paid_at:
          type: integer
          minimum: 0
        paid_checkout:
          $ref: "#/components/schemas/Checkout"
        active_checkout:
          $ref: "#/components/schemas/Checkout"
        checkouts:
          type: array
          items:
            $ref: "#/components/schemas/Checkout"
        wallet_scan_performed:
          type: boolean
        transactions_checked:
          type: integer
          minimum: 0
    FiatAmount:
      type: object
      additionalProperties: false
      required:
        - currency
        - value
      properties:
        currency:
          type: string
          pattern: "^[A-Z]{3}$"
        value:
          type: string
          pattern: "^[0-9]+(\\.[0-9]+)?$"
    BitcoinAmount:
      type: object
      additionalProperties: false
      required:
        - currency
        - value
      properties:
        currency:
          type: string
          enum:
            - BTC
            - SAT
            - SATS
        value:
          type: string
          pattern: "^[0-9]+(\\.[0-9]+)?$"
    RateQuote:
      type: object
      additionalProperties: true
      required:
        - fiat
        - btc_fiat_price
        - amount_sats
        - amount_msats
        - source
        - as_of
        - expires_at
    TransactionState:
      type: string
      enum:
        - pending
        - settled
        - expired
        - failed
        - accepted
    WorkflowState:
      type: string
      enum:
        - draft
        - invoice_created
        - verifying
        - settlement_action_pending
        - settlement_action_completed
        - expiry_pending_verification
        - expired_closed
        - failed_closed
        - cancelled
    Error:
      type: object
      additionalProperties: false
      required:
        - code
        - message
      properties:
        code:
          type: string
          enum:
            - NOT_IMPLEMENTED
            - RESTRICTED
            - UNAUTHORIZED
            - RATE_LIMITED
            - QUOTA_EXCEEDED
            - INTERNAL
            - UNSUPPORTED_ENCRYPTION
            - INSUFFICIENT_BALANCE
            - PAYMENT_FAILED
            - OTHER
            - NOT_FOUND
            - TIMEOUT
            - INVALID_REQUEST
            - WALLET_UNAVAILABLE
            - INVOICE_EXPIRED
            - UNSUPPORTED_METHOD
            - CONFLICT
        message:
          type: string
          minLength: 1
        retryable:
          type: boolean
        request_id:
          type: string
        details:
          type: object
          additionalProperties: true
