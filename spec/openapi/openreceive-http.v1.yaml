openapi: 3.1.0
info:
  title: OpenReceive component schemas
  version: 0.1.0
  summary: Shared receive-checkout shapes for app-owned controllers.
  description: >
    OpenReceive does not define application routes. Apps call the Node service
    methods from their own controllers and may use these schemas as references
    for their own payloads. Receive-only NWC codes remain server-side.
paths: {}
components:
  parameters:
    OrderId:
      name: order_id
      in: path
      required: true
      schema:
        type: string
        minLength: 1
        maxLength: 200
    CheckoutId:
      name: checkout_id
      in: path
      required: true
      schema:
        type: string
        pattern: "^or_chk_[a-z0-9_]+$"
  responses:
    Error:
      description: OpenReceive error.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
  schemas:
    CreateCheckoutRequest:
      type: object
      additionalProperties: false
      required:
        - order_id
        - amount
      properties:
        order_id:
          type: string
          minLength: 1
          maxLength: 200
        amount:
          $ref: "#/components/schemas/CreateCheckoutAmount"
        memo:
          type: string
          maxLength: 500
        description_hash:
          type: string
          pattern: "^[0-9a-fA-F]{64}$"
        metadata:
          type: object
          additionalProperties: true
      not:
        required:
          - memo
          - description_hash
    CreateCheckoutAmount:
      type: object
      additionalProperties: false
      properties:
        btc:
          $ref: "#/components/schemas/BitcoinAmount"
        fiat:
          $ref: "#/components/schemas/FiatAmount"
      oneOf:
        - required:
            - btc
          not:
            anyOf:
              - required:
                  - fiat
        - required:
            - fiat
          not:
            anyOf:
              - required:
                  - btc
    QuoteRateRequest:
      type: object
      additionalProperties: false
      required:
        - fiat
      properties:
        fiat:
          $ref: "#/components/schemas/FiatAmount"
    BtcFiatRateMap:
      type: object
      additionalProperties: false
      required:
        - bitcoin
      properties:
        bitcoin:
          type: object
          additionalProperties:
            oneOf:
              - type: number
              - type: string
                pattern: "^[0-9]+(\\.[0-9]+)?$"
    Invoice:
      type: object
      additionalProperties: true
      required:
        - invoice_id
        - type
        - rail
        - transaction_state
        - workflow_state
        - invoice
        - payment_hash
        - amount_msats
        - order_id
        - created_at
        - expires_at
        - settlement_action_state
      properties:
        invoice_id:
          type: string
          pattern: "^or_inv_[a-z0-9_]+$"
        type:
          const: incoming
        rail:
          type: string
          enum:
            - lightning
            - swap
        transaction_state:
          $ref: "#/components/schemas/TransactionState"
        workflow_state:
          $ref: "#/components/schemas/WorkflowState"
        invoice:
          type:
            - string
            - "null"
        payment_hash:
          type: string
          pattern: "^[0-9a-fA-F]{64}$"
        amount_msats:
          type: integer
          minimum: 1000
          maximum: 9007199254740991
        order_id:
          type: string
          minLength: 1
        created_at:
          type: integer
          minimum: 0
        expires_at:
          type: integer
          minimum: 0
        refreshed_from_invoice_id:
          type: string
          pattern: "^or_inv_[a-z0-9_]+$"
        settled_at:
          type: integer
          minimum: 0
        settlement_action_state:
          type: string
          enum:
            - pending
            - completed
            - failed
        settlement_action_completed_at:
          type: integer
          minimum: 0
        fiat_quote:
          oneOf:
            - $ref: "#/components/schemas/RateQuote"
            - type: "null"
        swap:
          $ref: "#/components/schemas/SwapOrder"
    SwapOrder:
      type: object
      additionalProperties: false
      required:
        - attempt_id
        - provider
        - pay_in_asset
        - deposit_address
        - deposit_amount
        - provider_state
        - provider_expires_at
      properties:
        attempt_id:
          type: string
          pattern: "^or_inv_[a-z0-9_]+$"
        provider:
          type: string
          minLength: 1
        provider_order_id:
          type: string
          minLength: 1
        pay_in_asset:
          type: string
          enum:
            - SOL_SOL
            - USDT_TRON
            - USDT_SOL
            - USDC_SOL
            - ETH_ETH
            - USDT_ETH
            - USDC_ETH
        deposit_address:
          type: string
          minLength: 1
        deposit_memo:
          type: string
          minLength: 1
        deposit_amount:
          type: string
          pattern: "^[0-9]+(\\.[0-9]+)?$"
        provider_state:
          type: string
          enum:
            - creating_provider_order
            - awaiting_deposit
            - confirming
            - exchanging
            - paying_invoice
            - completed
            - expired
            - refund_required
            - refund_pending
            - refunded
            - attention
            - failed
        provider_expires_at:
          type: integer
          minimum: 0
        deposit_tx_id:
          type: string
        payout_tx_id:
          type: string
        refund_address:
          type: string
        refund_nonce:
          type: string
          pattern: "^or_ref_[a-f0-9]{32}$"
        refund_tx_id:
          type: string
        attention:
          type: boolean
    SwapOption:
      type: object
      additionalProperties: false
      required:
        - pay_in_asset
        - label
        - network_label
        - provider
        - available
      properties:
        pay_in_asset:
          type: string
          enum:
            - SOL_SOL
            - USDT_TRON
            - USDT_SOL
            - USDC_SOL
            - ETH_ETH
            - USDT_ETH
            - USDC_ETH
        label:
          type: string
          minLength: 1
        network_label:
          type: string
          minLength: 1
        provider:
          type: string
        available:
          type: boolean
        unavailable_reason:
          type: string
        unavailable_message:
          type: string
        pay_amount:
          type: string
          pattern: "^[0-9]+(\\.[0-9]+)?$"
        minimum_pay_amount:
          type: string
          pattern: "^[0-9]+(\\.[0-9]+)?$"
        maximum_pay_amount:
          type: string
          pattern: "^[0-9]+(\\.[0-9]+)?$"
    Checkout:
      type: object
      additionalProperties: false
      required:
        - checkout_id
        - order_id
        - status
        - amount_msats
        - invoices
        - created_at
      properties:
        checkout_id:
          type: string
          pattern: "^or_chk_[a-z0-9_]+$"
        order_id:
          type: string
          minLength: 1
        status:
          type: string
          enum:
            - open
            - superseded
            - paid
            - expired
        amount_msats:
          type: integer
          minimum: 1000
          maximum: 9007199254740991
        fiat:
          $ref: "#/components/schemas/FiatAmount"
        active:
          $ref: "#/components/schemas/Invoice"
        invoices:
          type: array
          items:
            $ref: "#/components/schemas/Invoice"
        paid_at:
          type: integer
          minimum: 0
        created_at:
          type: integer
          minimum: 0
    Order:
      type: object
      additionalProperties: false
      required:
        - order_id
        - status
        - paid
        - checkouts
        - wallet_scan_performed
        - transactions_checked
      properties:
        order_id:
          type: string
          minLength: 1
        status:
          type: string
          enum:
            - pending
            - paid
            - expired
        paid:
          type: boolean
        paid_at:
          type: integer
          minimum: 0
        paid_checkout:
          $ref: "#/components/schemas/Checkout"
        active_checkout:
          $ref: "#/components/schemas/Checkout"
        display_checkout:
          $ref: "#/components/schemas/Checkout"
        checkouts:
          type: array
          items:
            $ref: "#/components/schemas/Checkout"
        wallet_scan_performed:
          type: boolean
        transactions_checked:
          type: integer
          minimum: 0
        payment_methods:
          type: array
          items:
            $ref: "#/components/schemas/SwapOption"
    FiatAmount:
      type: object
      additionalProperties: false
      required:
        - currency
        - value
      properties:
        currency:
          type: string
          pattern: "^[A-Z]{3}$"
        value:
          type: string
          pattern: "^[0-9]+(\\.[0-9]+)?$"
    BitcoinAmount:
      type: object
      additionalProperties: false
      required:
        - currency
        - value
      properties:
        currency:
          type: string
          enum:
            - BTC
            - SAT
            - SATS
        value:
          type: string
          pattern: "^[0-9]+(\\.[0-9]+)?$"
    RateQuote:
      type: object
      additionalProperties: true
      required:
        - fiat
        - btc_fiat_price
        - amount_sats
        - amount_msats
        - source
        - as_of
        - expires_at
    TransactionState:
      type: string
      enum:
        - pending
        - settled
        - expired
        - failed
        - accepted
    WorkflowState:
      type: string
      enum:
        - draft
        - invoice_created
        - verifying
        - settlement_action_pending
        - settlement_action_completed
        - expiry_pending_verification
        - expired_closed
        - failed_closed
        - cancelled
    Error:
      type: object
      additionalProperties: false
      required:
        - code
        - message
      properties:
        code:
          type: string
          enum:
            - NOT_IMPLEMENTED
            - RESTRICTED
            - UNAUTHORIZED
            - RATE_LIMITED
            - QUOTA_EXCEEDED
            - INTERNAL
            - UNSUPPORTED_ENCRYPTION
            - INSUFFICIENT_BALANCE
            - PAYMENT_FAILED
            - OTHER
            - NOT_FOUND
            - TIMEOUT
            - INVALID_REQUEST
            - WALLET_UNAVAILABLE
            - INVOICE_EXPIRED
            - UNSUPPORTED_METHOD
            - CONFLICT
        message:
          type: string
          minLength: 1
        retryable:
          type: boolean
        request_id:
          type: string
        details:
          type: object
          additionalProperties: true
