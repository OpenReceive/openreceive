networks:
  demo_proxy:
    external: true
    name: openreceive_demo_proxy

services:
  nextjs-demo:
    image: ghcr.io/openreceive/demo-nextjs:${OPENRECEIVE_IMAGE_TAG:?set OPENRECEIVE_IMAGE_TAG}
    expose:
      - "3002"
    networks:
      - demo_proxy
    environment:
      OPENRECEIVE_DEMO_MODE: ${OPENRECEIVE_DEMO_MODE:-test_nwc}
      OPENRECEIVE_PUBLIC_URL: https://nextjs-demo.openreceive.org
      OPENRECEIVE_GIT_SHA: ${OPENRECEIVE_GIT_SHA:-}
      OPENRECEIVE_IMAGE_DIGEST: ${OPENRECEIVE_IMAGE_DIGEST:-}
      OPENRECEIVE_DEPLOYED_AT: ${OPENRECEIVE_DEPLOYED_AT:-}
      PORT: "3002"
    volumes:
      - /opt/openreceive/secrets/openreceive.yml:/app/examples/hello-fruit/server/nextjs-fullstack/openreceive.yml:ro
    restart: unless-stopped
