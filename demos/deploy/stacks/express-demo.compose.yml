networks:
  demo_proxy:
    external: true
    name: openreceive_demo_proxy

services:
  express-demo:
    image: ghcr.io/openreceive/demo-express:${OPENRECEIVE_IMAGE_TAG:?set OPENRECEIVE_IMAGE_TAG}
    expose:
      - "3000"
    networks:
      - demo_proxy
    env_file:
      - path: /opt/openreceive/secrets/rizful-test-wallet.env
        required: false
    environment:
      OPENRECEIVE_DEMO_MODE: ${OPENRECEIVE_DEMO_MODE:-test_nwc}
      OPENRECEIVE_PUBLIC_URL: https://express-demo.openreceive.org
      OPENRECEIVE_GIT_SHA: ${OPENRECEIVE_GIT_SHA:-}
      OPENRECEIVE_IMAGE_DIGEST: ${OPENRECEIVE_IMAGE_DIGEST:-}
      OPENRECEIVE_DEPLOYED_AT: ${OPENRECEIVE_DEPLOYED_AT:-}
      PORT: "3000"
    restart: unless-stopped
