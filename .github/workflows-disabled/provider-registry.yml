name: Provider Registry

on:
  # Temporarily manual-only while CI is being stabilized.
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: provider-registry-${{ github.ref }}
  cancel-in-progress: true

jobs:
  registry:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run validate
      - run: node --test tests/v0.1/provider-data.test.mjs
