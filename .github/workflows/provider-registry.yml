name: Provider Registry

on:
  pull_request:
    paths:
      - "spec/data/providers/**"
      - "spec/schemas/provider-registry.schema.json"
      - "packages/js/provider-data/**"
      - "tests/v0.1/provider-data.test.mjs"
      - "docs/09-provider-registry.md"
      - "package*.json"
  push:
    branches:
      - master
      - main
    paths:
      - "spec/data/providers/**"
      - "spec/schemas/provider-registry.schema.json"
      - "packages/js/provider-data/**"
      - "tests/v0.1/provider-data.test.mjs"
      - "docs/09-provider-registry.md"
      - "package*.json"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: provider-registry-${{ github.ref }}
  cancel-in-progress: true

jobs:
  registry:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run validate
      - run: node --test tests/v0.1/provider-data.test.mjs
