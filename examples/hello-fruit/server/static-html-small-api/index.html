<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenReceive Hello Fruit Static</title>
  </head>
  <body>
    <main class="page">
      <section class="checkout" aria-labelledby="product-title">
        <div class="topbar" id="topbar"></div>

        <div class="product">
          <img id="product-sticker" alt="" />
          <div>
            <h1 id="product-title">Hello Fruit</h1>
            <p id="product-description"></p>
          </div>
        </div>

        <div id="currency-panel"></div>

        <div class="fruit-grid" id="fruit-grid"></div>

        <button class="primary" id="add-to-cart" type="button">
          Add to cart ($2.00)
        </button>

        <div id="cart-panel"></div>
        <button class="primary" disabled id="create-order" type="button">
          Create order
        </button>

        <div id="checkout-panel"></div>
        <p class="error" id="error" role="status"></p>
      </section>
    </main>
    <script type="module" src="/src/client/main.ts"></script>
  </body>
</html>
