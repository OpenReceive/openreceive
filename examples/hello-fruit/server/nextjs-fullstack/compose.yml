services:
  hello-fruit-nextjs-fullstack:
    build:
      context: ../../../..
      dockerfile: examples/hello-fruit/server/nextjs-fullstack/Dockerfile
    environment:
      OPENRECEIVE_DEMO_MODE: ${OPENRECEIVE_DEMO_MODE:-test_nwc}
      PORT: "3002"
    expose:
      - "3002"
    volumes:
      - ../../../../openreceive.yml:/app/examples/hello-fruit/server/nextjs-fullstack/openreceive.yml:ro
      - openreceive-nextjs-fullstack-openreceive:/app/examples/hello-fruit/server/nextjs-fullstack/.openreceive

volumes:
  openreceive-nextjs-fullstack-openreceive:
