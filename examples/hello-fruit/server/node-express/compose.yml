services:
  hello-fruit-node-express:
    build:
      context: ../../../..
      dockerfile: examples/hello-fruit/server/node-express/Dockerfile
    environment:
      OPENRECEIVE_DEMO_MODE: ${OPENRECEIVE_DEMO_MODE:-test_nwc}
      PORT: "3000"
    expose:
      - "3000"
    volumes:
      - ../../../../openreceive.yml:/app/examples/hello-fruit/server/node-express/openreceive.yml:ro
      - openreceive-node-express-openreceive:/app/examples/hello-fruit/server/node-express/.openreceive

volumes:
  openreceive-node-express-openreceive:
