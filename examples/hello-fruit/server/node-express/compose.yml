services:
  hello-fruit-node-express:
    build:
      context: ../../../..
      dockerfile: examples/hello-fruit/server/node-express/Dockerfile
    depends_on:
      - openreceive-postgres
    env_file:
      - path: ../../../../.env
        required: false
    environment:
      OPENRECEIVE_STORE: postgres://openreceive:openreceive@openreceive-postgres:5432/openreceive
      OPENRECEIVE_NAMESPACE: hello_fruit_express
      OPENRECEIVE_DEMO_MODE: ${OPENRECEIVE_DEMO_MODE:-test_nwc}
      OPENRECEIVE_DEPLOYED_AT: ${OPENRECEIVE_DEPLOYED_AT:-}
      OPENRECEIVE_GIT_SHA: ${OPENRECEIVE_GIT_SHA:-}
      OPENRECEIVE_IMAGE_DIGEST: ${OPENRECEIVE_IMAGE_DIGEST:-}
      PORT: "3000"
    expose:
      - "3000"
  openreceive-postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: openreceive
      POSTGRES_USER: openreceive
      POSTGRES_PASSWORD: openreceive
    volumes:
      - openreceive-postgres-data:/var/lib/postgresql/data

volumes:
  openreceive-postgres-data:
